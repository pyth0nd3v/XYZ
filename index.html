<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Virkode</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#06060A;
  --fg:#EEEAE3;
  --accent:#C8FF00;
  --muted:rgba(238,234,227,0.35);
  --line:rgba(238,234,227,0.08);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--fg);
  font-family:'Instrument Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  cursor:crosshair;
}

body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.055'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:999;
  opacity:.5;
}

.screen{
  position:relative;
  width:100vw;height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:clamp(20px,3vw,40px) clamp(20px,3.5vw,48px);
  overflow:hidden;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  z-index:10;
  animation:fadeIn .6s .1s both;
}

.logo-word{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(16px,2.2vw,22px);
  letter-spacing:.14em;
  color:var(--fg);
  opacity:.6;
}

.status{
  display:flex;align-items:center;gap:8px;
  font-size:11px;
  font-style:italic;
  color:var(--muted);
  letter-spacing:.06em;
}

.dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--accent);
  animation:blink 2.2s ease-in-out infinite;
  flex-shrink:0;
}

@keyframes blink{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,255,0,0);}
  50%{opacity:.4;box-shadow:0 0 8px 2px rgba(200,255,0,0.35);}
}

.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.rule{
  position:absolute;left:0;right:0;
  height:1px;background:var(--line);
}
.rule-top{top:0;}
.rule-bottom{bottom:0;}

.name-wrap{
  position:relative;
  display:block;
  overflow:hidden;
}

.name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px, 22vw, 280px);
  letter-spacing:-.01em;
  line-height:.9;
  display:block;
  position:relative;
  z-index:2;
  clip-path:inset(0 100% 0 0);
  animation:slideReveal .9s cubic-bezier(.16,1,.3,1) .3s forwards;
}

@keyframes slideReveal{
  to{clip-path:inset(0 0% 0 0);}
}

.name-ghost{
  position:absolute;
  top:0;left:0;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px, 22vw, 280px);
  letter-spacing:-.01em;
  line-height:.9;
  -webkit-text-stroke:1px rgba(238,234,227,0.07);
  color:transparent;
  user-select:none;
  pointer-events:none;
  white-space:nowrap;
  transform:translateX(6px) translateY(6px);
}

.name-accent{
  display:inline-block;
  width:clamp(10px,2.5vw,30px);
  height:clamp(10px,2.5vw,30px);
  background:var(--accent);
  border-radius:50%;
  margin-left:4px;
  vertical-align:middle;
  position:relative;
  top:clamp(-6px,-1.2vw,-12px);
  animation:fadeIn .4s 1.15s both;
}

.tagline{
  margin-top:clamp(16px,2.5vh,32px);
  font-size:clamp(13px,1.4vw,17px);
  color:var(--muted);
  font-style:italic;
  letter-spacing:.02em;
  animation:fadeIn .7s .95s both;
  display:flex;
  align-items:center;
  gap:12px;
}

.tagline::before{
  content:'';
  display:block;
  width:32px;height:1px;
  background:var(--muted);
  flex-shrink:0;
}

.bottombar{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  position:relative;
  z-index:10;
  animation:fadeIn .6s 1.1s both;
  padding-top:clamp(12px,2vh,24px);
}

.coming{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(11px,1.1vw,14px);
  letter-spacing:.22em;
  color:var(--accent);
}

.year{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(11px,1.1vw,14px);
  letter-spacing:.18em;
  color:var(--muted);
}

.notify-wrap{
  display:flex;
  align-items:center;
  gap:0;
}

.notify-input{
  font-family:'Instrument Sans',sans-serif;
  font-size:12px;
  background:transparent;
  border:1px solid var(--line);
  border-right:none;
  color:var(--fg);
  padding:9px 14px;
  border-radius:6px 0 0 6px;
  outline:none;
  width:clamp(140px,18vw,200px);
  transition:border-color .2s;
  letter-spacing:.02em;
}
.notify-input::placeholder{color:var(--muted);font-style:italic;}
.notify-input:focus{border-color:rgba(200,255,0,0.3);}

.notify-btn{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:.1em;
  background:var(--accent);
  color:var(--bg);
  border:none;
  padding:10px 16px;
  border-radius:0 6px 6px 0;
  cursor:pointer;
  transition:opacity .2s;
  white-space:nowrap;
}
.notify-btn:hover{opacity:.85;}

.scanline{
  position:fixed;
  left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,255,0,0.05),transparent);
  animation:scan 6s linear infinite;
  pointer-events:none;
  z-index:998;
}
@keyframes scan{
  0%{top:-2px;}
  100%{top:100vh;}
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

canvas#trail{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:997;
  opacity:.45;
}

@media(max-width:500px){
  .notify-wrap{display:none;}
  .year{display:none;}
  .status span:not(.dot){display:none;}
}
</style>
</head>
<body>

<canvas id="trail"></canvas>
<div class="scanline"></div>

<div class="screen">

  <div class="topbar">
    <span class="logo-word">VIRKODE</span>
    <div class="status">
      <span class="dot"></span>
      <span>Something is being built</span>
    </div>
  </div>

  <div class="center">
    <div class="rule rule-top"></div>
    <div class="rule rule-bottom"></div>

    <div class="name-wrap">
      <span class="name-ghost" aria-hidden="true">VIRKODE</span>
      <span class="name">VIRKODE<span class="name-accent"></span></span>
    </div>

    <div class="tagline">
      We are launching soon &mdash; watch this space.
    </div>
  </div>

  <div class="bottombar">
    <span class="coming">Coming Soon</span>
    <div class="notify-wrap">
      <input class="notify-input" type="email" placeholder="your@email.com" id="emailInput"/>
      <button class="notify-btn" onclick="handleNotify()">Notify Me</button>
    </div>
    <span class="year">2025</span>
  </div>

</div>

<script>
const canvas=document.getElementById('trail');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);
const pts=[];
let mx=W/2,my=H/2;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
function loop(){
  ctx.clearRect(0,0,W,H);
  pts.push({x:mx,y:my,life:1});
  if(pts.length>40)pts.shift();
  for(let i=1;i<pts.length;i++){
    const p=pts[i],pp=pts[i-1];
    const alpha=p.life*(i/pts.length)*0.35;
    ctx.beginPath();
    ctx.moveTo(pp.x,pp.y);
    ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='rgba(200,255,0,'+alpha+')';
    ctx.lineWidth=1.5;
    ctx.lineCap='round';
    ctx.stroke();
    p.life*=0.94;
  }
  requestAnimationFrame(loop);
}
loop();

function handleNotify(){
  const inp=document.getElementById('emailInput');
  const v=inp.value.trim();
  if(!v||!v.includes('@')){inp.style.borderColor='rgba(255,80,80,0.4)';return;}
  inp.style.borderColor='rgba(200,255,0,0.4)';
  inp.value='';
  inp.placeholder="You're on the list \u2713";
  setTimeout(()=>{inp.placeholder='your@email.com';inp.style.borderColor='';},3000);
}
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleNotify();});
</script>

</body>
</html>
